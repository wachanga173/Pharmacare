<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Pharmacare</title>
    <link rel="icon" type="image/x-icon" href="../assets/images/favicon.ico">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="stylesheet" href="../css/pages/admin.css">
</head>
<body>
    <div id="app">
        <header id="header"></header>
        
        <main class="container">
            <section class="admin-page-section">
                <button onclick="window.history.back()" class="btn-back btn-back-light" style="display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem; background: white; border: 1px solid #e5e7eb; border-radius: 0.375rem; color: #374151; cursor: pointer; transition: all 0.3s; box-shadow: 0 1px 2px rgba(0,0,0,0.05); margin-bottom: 1rem;">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12.5 15L7.5 10L12.5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    Back
                </button>

                <h1>Admin Panel</h1>
                
                <!-- Tabs Navigation -->
                <div class="admin-tabs-wrap">
                    <div class="admin-tabs">
                    <button class="admin-tab active" data-tab="products">Products</button>
                    <button class="admin-tab" data-tab="orders">Orders</button>
                    <button class="admin-tab" data-tab="contacts">Contacts</button>
                    <button class="admin-tab" data-tab="users">Users</button>
                    </div>
                </div>
                
                <!-- Tab Contents -->
                <div class="admin-tab-content">
                    <!-- Products Tab -->
                    <div id="products-tab" class="tab-pane active">
                        <div class="admin-toolbar">
                            <button class="btn btn-primary" id="add-product-btn">Add Product</button>
                        </div>
                        <div id="admin-products-table" class="admin-table-wrap">
                            <p>Loading...</p>
                        </div>
                    </div>
                    
                    <!-- Orders Tab -->
                    <div id="orders-tab" class="tab-pane">
                        <div id="admin-orders-table" class="admin-table-wrap top-gap">
                            <p>Loading...</p>
                        </div>
                    </div>
                    
                    <!-- Contacts Tab -->
                    <div id="contacts-tab" class="tab-pane">
                        <div id="admin-contacts-table" class="admin-table-wrap top-gap">
                            <p>Loading...</p>
                        </div>
                    </div>
                    
                    <!-- Users Tab -->
                    <div id="users-tab" class="tab-pane">
                        <div id="admin-users-table" class="admin-table-wrap top-gap">
                            <p>Loading...</p>
                        </div>
                    </div>
                </div>
            </section>
        </main>
        
        <footer id="footer"></footer>
    </div>

    <div id="toast-container"></div>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/config.js"></script>
    <script type="module">
        import { initHeader } from '../js/components/header.js';
        import { initFooter } from '../js/components/footer.js';
        import { initAdminPage } from '../js/pages/admin.js';
        
        document.addEventListener('DOMContentLoaded', () => {
            initHeader();
            initFooter();
            initAdminPage();
        });
    </script>
</body>
</html>
