<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shopping Cart - Pharmacare</title>
    <link rel="icon" type="image/x-icon" href="../assets/images/favicon.ico" />
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/components.css" />
    <link rel="stylesheet" href="../css/responsive.css" />
    <link rel="stylesheet" href="../css/pages/cart.css" />
  </head>
  <body>
    <div id="app">
      <header id="header"></header>
      <main>
        <section class="cart-container">
          <a href="products.html" class="back-btn"
            >&larr; Back to Shopping</a
          >
          <h1>Shopping Cart</h1>
        </section>
        <!-- Side-by-side layout for cart sections -->
        <div class="cart-sections-wrapper">
          <!-- Section for Added Items -->
          <section id="cart-items-section">
            <h2>Added Items</h2>
            <div id="cart-container"></div>
          </section>
          <!-- Section for Total Cost -->
          <section id="cart-total-section">
            <h2>Total Cost</h2>
            <div id="cart-total" class="cart-total"></div>
            <button
              id="proceed-payment-btn"
              class="btn-proceed-payment"
            >
              Proceed to Payment
            </button>
          </section>
        </div>
      </main>
      <footer id="footer"></footer>
    </div>

    <div id="toast-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/config.js"></script>
    <script type="module">
      import { initHeader, updateCartBadge } from "../js/components/header.js";
      import { initFooter } from "../js/components/footer.js";
      import {
        getCart,
        removeFromCart,
        updateQuantity,
        addToCart,
      } from "../js/services/cart.js";

      async function renderSelectedCart() {
        const cartContainer = document.getElementById("cart-container");
        const totalPriceElem = document.getElementById("cart-total");
        const proceedBtn = document.getElementById("proceed-payment-btn");
        if (!cartContainer) return;
        cartContainer.innerHTML = "";

        const { items, total } = await getCart();

        if (!items.length) {
          cartContainer.innerHTML = `
            <div class="cart-empty-state">
              <h3>Your cart is empty</h3>
              <p>Add products to continue to checkout.</p>
              <a href="products.html" class="btn-empty-cart">Browse Medications</a>
            </div>
          `;
          if (totalPriceElem) {
            totalPriceElem.innerHTML = '<div class="cart-summary-empty">Cart totals will appear here after you add items.</div>';
          }
          if (proceedBtn) proceedBtn.style.display = "none";
          return;
        }

        // Build table
        const table = document.createElement("table");
        table.className = "cart-table";
        table.innerHTML = `
          <thead>
            <tr>
              <th>Image</th>
              <th>Name</th>
              <th>Quantity</th>
              <th>Subtotal</th>
              <th>Remove</th>
            </tr>
          </thead>
          <tbody>
            ${items
              .map(
                (item) => `
              <tr>
                <td data-label="Image"><img src="${item.product.image || item.product.image_url || "assets/images/products/placeholder.png"}" alt="${item.product.name}" class="cart-img" /></td>
                <td data-label="Name">${item.product.name}</td>
                <td data-label="Quantity" class="cart-qty-cell">
                  <button class="qty-btn" data-action="decrease" data-id="${item.productId}">-</button>
                  <span class="cart-qty-value">${item.quantity}</span>
                  <button class="qty-btn" data-action="increase" data-id="${item.productId}">+</button>
                </td>
                <td data-label="Subtotal">KSh ${(item.product.price * item.quantity).toFixed(2)}</td>
                <td data-label="Remove">
                  <button class="remove-btn" data-id="${item.productId}">Remove</button>
                </td>
              </tr>
            `,
              )
              .join("")}
          </tbody>
        `;
        cartContainer.appendChild(table);

        // Display detailed summary with breakdown
        if (totalPriceElem) {
          const subtotal = total;
          const shipping =
            subtotal >= CONFIG.FREE_SHIPPING_THRESHOLD
              ? 0
              : CONFIG.SHIPPING_COST;
          const tax = subtotal * CONFIG.TAX_RATE;
          const grandTotal = subtotal + shipping + tax;

          totalPriceElem.innerHTML = `
            <div class="cart-summary-list">
              <div class="cart-summary-row">
                <span class="summary-label">Subtotal:</span>
                <span class="summary-value">KSh ${subtotal.toFixed(2)}</span>
              </div>
              <div class="cart-summary-row">
                <span class="summary-label">Shipping:</span>
                <span class="summary-value ${shipping === 0 ? "shipping-free" : ""}">
                  ${shipping === 0 ? "FREE" : "KSh " + shipping.toFixed(2)}
                </span>
              </div>
              <div class="cart-summary-row">
                <span class="summary-label">Tax (${(CONFIG.TAX_RATE * 100).toFixed(0)}%):</span>
                <span class="summary-value">KSh ${tax.toFixed(2)}</span>
              </div>
              <hr class="cart-summary-divider">
              <div class="cart-summary-row cart-summary-total-row">
                <span>Total:</span>
                <span class="cart-summary-total-value">KSh ${grandTotal.toFixed(2)}</span>
              </div>
            </div>
          `;
        }

        if (proceedBtn) proceedBtn.style.display = "block";

        // Bind remove buttons
        cartContainer.querySelectorAll(".remove-btn").forEach((btn) => {
          btn.addEventListener("click", async (e) => {
            const id = btn.getAttribute("data-id");
            removeFromCart(id);
            renderSelectedCart();
            updateCartBadge();
          });
        });

        // Bind quantity buttons
        cartContainer.querySelectorAll(".qty-btn").forEach((btn) => {
          btn.addEventListener("click", async (e) => {
            const id = btn.getAttribute("data-id");
            const action = btn.getAttribute("data-action");
            let item = items.find((i) => String(i.productId) === String(id));
            if (!item) return;
            let newQty =
              action === "increase" ? item.quantity + 1 : item.quantity - 1;
            if (newQty < 1) return;

            if (action === "increase") {
              await addToCart(id, 1);
            } else {
              updateQuantity(id, newQty);
            }
            renderSelectedCart();
            updateCartBadge();
          });
        });
      }

      document.addEventListener("DOMContentLoaded", () => {
        initHeader();
        initFooter();
        renderSelectedCart();

        // Add event listener for proceed to payment button
        const proceedBtn = document.getElementById("proceed-payment-btn");
        if (proceedBtn) {
          proceedBtn.addEventListener("click", () => {
            window.location.href = "checkout.html";
          });
        }
      });
    </script>
    <!-- Footer should remain at the bottom. -->
  </body>
</html>
