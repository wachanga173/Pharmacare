<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shopping Cart - Pharmacare</title>
    <link rel="icon" type="image/x-icon" href="../assets/images/favicon.ico" />
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/components.css" />
    <link rel="stylesheet" href="../css/responsive.css" />
    <link rel="stylesheet" href="../css/pages/cart.css" />
  </head>
  <body>
    <div id="app">
      <header id="header"></header>
      <main>
        <section class="cart-container">
          <a href="products.html" class="back-btn" style="text-decoration: none"
            >&larr; Back to Shopping</a
          >
          <h1>Shopping Cart</h1>
        </section>
      </main>
      <footer id="footer"></footer>
    </div>

    <!-- Cart Items and Total Display -->
    <div id="cart-container"></div>
    <div id="cart-total" class="cart-total"></div>

    <div id="toast-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/config.js"></script>
    <script type="module">
      import { initHeader } from "../js/components/header.js";
      import { initFooter } from "../js/components/footer.js";
      import { getCart, removeFromCart } from "../js/services/cart.js";

      async function renderSelectedCart() {
        const cartContainer = document.getElementById("cart-container");
        const totalPriceElem = document.getElementById("cart-total");
        if (!cartContainer) return;
        cartContainer.innerHTML = "";

        const { items, total } = await getCart();

        if (!items.length) {
          cartContainer.innerHTML = "<p>Your cart is empty.</p>";
          if (totalPriceElem) totalPriceElem.textContent = "";
          return;
        }

        // Build table
        const table = document.createElement("table");
        table.className = "cart-table";
        table.innerHTML = `
          <thead>
            <tr>
              <th>Image</th>
              <th>Name</th>
              <th>Quantity</th>
              <th>Subtotal</th>
              <th>Remove</th>
            </tr>
          </thead>
          <tbody>
            ${items
              .map(
                (item) => `
              <tr>
                <td><img src="${item.product.image || item.product.image_url || "assets/images/products/placeholder.png"}" alt="${item.product.name}" class="cart-img" /></td>
                <td>${item.product.name}</td>
                <td>${item.quantity}</td>
                <td>$${(item.product.price * item.quantity).toFixed(2)}</td>
                <td>
                  <button class="remove-btn" data-id="${item.productId}">Remove</button>
                </td>
              </tr>
            `,
              )
              .join("")}
          </tbody>
        `;
        cartContainer.appendChild(table);

        // Display total price
        if (totalPriceElem)
          totalPriceElem.textContent = `Total: $${total.toFixed(2)}`;

        // Bind remove buttons
        cartContainer.querySelectorAll(".remove-btn").forEach((btn) => {
          btn.addEventListener("click", async (e) => {
            const id = btn.getAttribute("data-id");
            removeFromCart(id);
            renderSelectedCart();
          });
        });
      }

      document.addEventListener("DOMContentLoaded", () => {
        initHeader();
        initFooter();
        renderSelectedCart();
      });
    </script>
    <!-- Footer should remain at the bottom -->
  </body>
</html>
